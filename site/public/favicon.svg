<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Inspekt mark: a selection frame with a single click-point dot.
       Reads as "this element, this point". Single committed color (violet),
       no gradient. Frame is the inspector's bounding box; dot is the cursor
       target. Works at 16px and scales clean. -->
  <rect
    x="3"
    y="3"
    width="26"
    height="26"
    rx="3"
    fill="none"
    stroke="#6d28d9"
    stroke-width="2.5"
    stroke-dasharray="4 3"
  />
  <circle cx="16" cy="16" r="3.5" fill="#6d28d9" />
</svg>
