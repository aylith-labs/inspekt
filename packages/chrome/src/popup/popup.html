<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: #cbd5e1;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #3b82f6; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); }
    .info {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      color: #64748b;
    }
    .info-row span:last-child { color: #1e293b; font-weight: 500; }
    .status {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .status-plugin { background: #dcfce7; color: #166534; }
    .status-standalone { background: #fef3c7; color: #92400e; }
    .status-inactive { background: #f1f5f9; color: #64748b; }
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
    }
    .btn {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #f1f5f9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>DevLens</h1>
    <div class="toggle" id="toggle"></div>
  </div>
  <div class="info">
    <div class="info-row">
      <span>Mode</span>
      <span id="mode">Click (Ctrl+Alt)</span>
    </div>
    <div class="info-row">
      <span>Editor</span>
      <span id="editor">Cursor</span>
    </div>
    <div class="info-row">
      <span>Tree Panel</span>
      <span id="tree">On</span>
    </div>
    <div class="info-row">
      <span>Status</span>
      <span id="status" class="status status-inactive">Inactive</span>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="settings-btn">Settings</button>
    <button class="btn" id="standalone-btn">Standalone</button>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
