<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DevLens Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
      color: #1e293b;
      background: #f8fafc;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .field label { color: #475569; }
    select, input[type="text"], input[type="color"] {
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    select { min-width: 140px; }
    input[type="color"] { width: 40px; height: 32px; padding: 2px; cursor: pointer; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-label input { width: 16px; height: 16px; accent-color: #3b82f6; }
    .actions { display: flex; gap: 8px; margin-top: 24px; }
    .btn {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #475569;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { background: #f1f5f9; }
    .btn-primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
    .saved {
      display: none;
      color: #16a34a;
      font-size: 13px;
      margin-left: 12px;
    }
    .saved.show { display: inline; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h1>DevLens Settings</h1>

  <h2>General</h2>
  <div class="field">
    <label>Editor</label>
    <select id="editor">
      <option value="cursor">Cursor</option>
      <option value="vscode">VS Code</option>
      <option value="vscode-insiders">VS Code Insiders</option>
      <option value="windsurf">Windsurf</option>
      <option value="webstorm">WebStorm</option>
      <option value="phpstorm">PhpStorm</option>
      <option value="idea">IntelliJ IDEA</option>
      <option value="sublime">Sublime Text</option>
      <option value="zed">Zed</option>
    </select>
  </div>
  <div class="field">
    <label>Activation</label>
    <select id="activation">
      <option value="click">Click (Ctrl+Alt+Click)</option>
      <option value="hover">Hover</option>
      <option value="manual">Manual</option>
    </select>
  </div>
  <div class="field">
    <label>Theme</label>
    <select id="theme">
      <option value="auto">Auto (System)</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>

  <h2>Visual</h2>
  <div class="field">
    <label>Highlight Color</label>
    <input type="color" id="highlightColor" value="#3b82f6">
  </div>
  <div class="field">
    <label>Highlight Style</label>
    <select id="highlightStyle">
      <option value="glow">Glow</option>
      <option value="solid">Solid</option>
      <option value="dashed">Dashed</option>
    </select>
  </div>
  <div class="field">
    <label>Animation</label>
    <select id="animation">
      <option value="pulse">Pulse</option>
      <option value="none">None</option>
    </select>
  </div>

  <h2>Tree Panel</h2>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="treePanelEnabled" checked>
      Enable tree panel
    </label>
  </div>
  <div class="field">
    <label>Position</label>
    <select id="treePanelPosition">
      <option value="right">Right</option>
      <option value="left">Left</option>
    </select>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="showProps" checked>
      Show component props
    </label>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="showLineNumbers" checked>
      Show line numbers
    </label>
  </div>

  <h2>Import / Export</h2>
  <textarea id="config-json" placeholder="Paste JSON to import settings..."></textarea>
  <div class="actions">
    <button class="btn" id="export-btn">Export</button>
    <button class="btn" id="import-btn">Import</button>
    <button class="btn btn-primary" id="save-btn">Save</button>
    <span class="saved" id="saved-msg">Saved!</span>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
