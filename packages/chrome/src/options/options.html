<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inspekt Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
      color: #1e293b;
      background: #f8fafc;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .field label { color: #475569; }
    select, input[type="text"], input[type="color"] {
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    select { min-width: 140px; }
    input[type="color"] { width: 40px; height: 32px; padding: 2px; cursor: pointer; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-label input { width: 16px; height: 16px; accent-color: #3b82f6; }
    .actions { display: flex; gap: 8px; margin-top: 24px; align-items: center; }
    .btn {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #475569;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { background: #f1f5f9; }
    .btn-primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
    .saved {
      display: none;
      color: #16a34a;
      font-size: 13px;
      margin-left: 8px;
    }
    .saved.show { display: inline; }
    .subheader {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .subheader h1 { margin-bottom: 0; }
    .welcome-link {
      font-size: 13px;
      color: #3b82f6;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .welcome-link:hover { color: #2563eb; text-decoration: underline; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.18);
      width: 520px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .modal-header h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: #64748b;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .modal-close:hover { background: #f1f5f9; color: #1e293b; }
    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-body textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      resize: vertical;
      background: #f8fafc;
      color: #1e293b;
    }
    .modal-body textarea:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
      border-color: #3b82f6;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid #e2e8f0;
    }

    /* Diff preview */
    .diff-header { font-size: 12px; font-weight: 600; color: #475569; margin: 12px 0 6px; }
    .diff-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      background: #f1f5f9;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .diff-key { font-weight: 600; color: #1e293b; min-width: 120px; }
    .diff-old { color: #dc2626; text-decoration: line-through; }
    .diff-arrow { color: #94a3b8; }
    .diff-new { color: #16a34a; font-weight: 500; }
    .diff-empty { font-size: 12px; color: #94a3b8; padding: 8px 0; }
    .diff-error { font-size: 12px; color: #dc2626; padding: 8px 0; }
  </style>
</head>
<body>
  <div class="subheader">
    <h1>Inspekt Settings</h1>
    <button type="button" class="welcome-link" id="open-welcome">Open welcome tour &rarr;</button>
  </div>

  <h2>General</h2>
  <div class="field">
    <label>Editor</label>
    <select id="editor">
      <option value="cursor">Cursor</option>
      <option value="vscode">VS Code</option>
      <option value="vscode-insiders">VS Code Insiders</option>
      <option value="windsurf">Windsurf</option>
      <option value="webstorm">WebStorm</option>
      <option value="phpstorm">PhpStorm</option>
      <option value="idea">IntelliJ IDEA</option>
      <option value="sublime">Sublime Text</option>
      <option value="zed">Zed</option>
    </select>
  </div>
  <div class="field">
    <label>Activation</label>
    <select id="activation">
      <option value="click">Click (Ctrl+Alt+Click)</option>
      <option value="hover-mod">Hover (Ctrl+Alt)</option>
      <option value="hover">Hover (always)</option>
      <option value="manual">Manual</option>
    </select>
  </div>
  <div class="field">
    <label>Theme</label>
    <select id="theme">
      <option value="auto">Auto (System)</option>
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </div>

  <h2>Visual</h2>
  <div class="field">
    <label>Highlight Color</label>
    <input type="color" id="highlightColor" value="#3b82f6">
  </div>
  <div class="field">
    <label>Highlight Style</label>
    <select id="highlightStyle">
      <option value="glow">Glow</option>
      <option value="solid">Solid</option>
      <option value="dashed">Dashed</option>
    </select>
  </div>
  <div class="field">
    <label>Animation</label>
    <select id="animation">
      <option value="pulse">Pulse</option>
      <option value="none">None</option>
    </select>
  </div>

  <h2>Tree Panel</h2>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="treePanelEnabled" checked>
      Enable tree panel
    </label>
  </div>
  <div class="field">
    <label>Position</label>
    <select id="treePanelPosition">
      <option value="right">Right</option>
      <option value="left">Left</option>
    </select>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="showProps" checked>
      Show component props
    </label>
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="showLineNumbers" checked>
      Show line numbers
    </label>
  </div>

  <h2>Import / Export</h2>
  <div class="actions">
    <button class="btn" id="export-btn">Export settings</button>
    <button class="btn" id="import-btn">Import settings</button>
    <span class="saved" id="saved-msg">Saved!</span>
  </div>

  <!-- Import/Export Modal -->
  <div class="modal-overlay" id="ie-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="ie-modal-title">Export Settings</h3>
        <button type="button" class="modal-close" id="ie-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <textarea id="ie-json"></textarea>
        <div id="ie-preview"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="ie-copy" type="button">Copy to clipboard</button>
        <button class="btn btn-primary" id="ie-apply" type="button">Apply changes</button>
      </div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
